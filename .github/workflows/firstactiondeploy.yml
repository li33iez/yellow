name: Deploy Static Website with Nginx

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEYS }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} <<EOF
            cd /home/ec2-user/today

            # pull latest code
            git pull origin main

            # stop and remove old container
            docker rm -f newapp || true

            # rebuild image (no cache to reflect changes)
            docker build --no-cache -t april:latest .

            # run new container
            docker run -d -p 8089:80 --name newapp april:latest
          EOF
